<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termômetro do Casal</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box}html{height:auto}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#f8f9fa 0%,#e8f4f8 100%);min-height:100vh;padding:20px;color:#2d3748}.container{max-width:700px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 10px 40px rgba(30,58,95,.1)}.header{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8c 100%);color:#fff;padding:40px 30px;text-align:center}.header h1{font-size:28px;margin-bottom:10px;font-weight:700}.header p{font-size:14px;opacity:.95;line-height:1.6}.content{padding:40px 30px}.section{display:none}.section.active{display:block;animation:fadeIn .3s ease-in}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.progress-bar{width:100%;height:6px;background:#e2e8f0;border-radius:3px;margin-bottom:30px;overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,#1e3a5f 0%,#2d5a8c 100%);transition:width .3s ease}.instructions{background:#f0f7ff;border-left:4px solid #1e3a5f;padding:20px;border-radius:6px;margin-bottom:30px;line-height:1.8;font-size:14px}.instructions strong{color:#1e3a5f}.safety-alert{background:#fff5f5;border-left:4px solid #e53e3e;padding:20px;border-radius:6px;margin-bottom:30px;line-height:1.8;font-size:14px;color:#742a2a}.safety-alert strong{color:#c53030}.question-group{margin-bottom:40px}.question-group h3{color:#1e3a5f;font-size:16px;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #e2e8f0}.question{margin-bottom:25px}.question-text{font-size:15px;margin-bottom:12px;color:#2d3748;font-weight:500}.scale-options{display:flex;gap:8px;flex-wrap:wrap}.scale-option{flex:1;min-width:45px;text-align:center}.scale-option input[type="radio"]{display:none}.scale-option label{display:block;padding:10px;border:2px solid #e2e8f0;border-radius:6px;cursor:pointer;transition:all .2s ease;font-size:13px;font-weight:600;background:#fff;color:#2d3748;user-select:none}.scale-option input[type="radio"]:checked+label{background:#1e3a5f;color:#fff;border-color:#1e3a5f}.choice-options{display:flex;gap:15px;margin-top:15px;flex-direction:column}.choice-option input[type="radio"]{display:none}.choice-option label{display:block;padding:15px;border:2px solid #e2e8f0;border-radius:6px;cursor:pointer;transition:all .2s ease;font-weight:600;text-align:center;background:#fff;color:#2d3748;user-select:none}.choice-option input[type="radio"]:checked+label{background:#1e3a5f;color:#fff;border-color:#1e3a5f}.button-group{display:flex;gap:15px;margin-top:40px;justify-content:space-between;flex-wrap:wrap}button{padding:12px 30px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s ease;width:100%;margin-bottom:10px}.btn-primary{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8c 100%);color:#fff}.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(30,58,95,.3)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}.btn-secondary{background:#e2e8f0;color:#2d3748}.btn-secondary:hover{background:#cbd5e0}.progress-text{font-size:12px;color:#666;margin-bottom:15px;text-align:center}.result-band{background:linear-gradient(135deg,#1e3a5f 0%,#2d5a8c 100%);color:#fff;padding:30px;border-radius:8px;margin-bottom:30px;text-align:center}.result-band h2{font-size:28px;margin-bottom:15px}.result-band .score{font-size:48px;font-weight:700;margin:15px 0}.result-band p{font-size:14px;line-height:1.8;opacity:.95}.result-interpretation{background:#f0f7ff;border-left:4px solid #1e3a5f;padding:20px;border-radius:6px;margin-bottom:30px;line-height:1.8;font-size:14px;color:#2d3748}.scores-table{width:100%;margin-bottom:30px;border-collapse:collapse}.scores-table th,.scores-table td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:14px}.scores-table th{background:#f8f9fa;font-weight:600;color:#1e3a5f}.area-name{font-weight:600;color:#2d3748}.area-score{text-align:right;color:#1e3a5f;font-weight:700}.strongest-weakest{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px}.card{padding:20px;border-radius:8px;text-align:center}.card-strongest{background:#f0fdf4;border:2px solid #22c55e}.card-weakest{background:#fef2f2;border:2px solid #ef4444}.card h4{font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;color:#666}.card p{font-size:16px;font-weight:700;color:#2d3748}.recommendation{background:#fffbeb;border-left:4px solid #f59e0b;padding:20px;border-radius:6px;margin-bottom:30px;line-height:1.8;font-size:14px}.recommendation h4{color:#d97706;margin-bottom:10px;font-weight:700}.closing-message{background:#f0f7ff;border-left:4px solid #1e3a5f;padding:20px;border-radius:6px;line-height:1.8;font-size:14px;color:#2d3748;font-style:italic}@media (max-width:600px){.header{padding:30px 20px}.header h1{font-size:22px}.content{padding:25px 20px}.strongest-weakest{grid-template-columns:1fr}.scale-options{gap:5px}.scale-option{min-width:40px}.scale-option label{padding:8px 5px;font-size:12px}button{width:100%}}
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Termômetro do Casal</h1>
            <p>Descubra como está a saúde do seu relacionamento e saiba por onde começar a reconstrução.</p>
        </div>
        <div class="content" id="content"></div>
    </div>

    <script>
        const areas = [
            { name: 'Comunicação', questions: ['Conseguimos conversar sobre problemas sem atacar um ao outro.', 'Eu me sinto ouvido(a) quando expresso meus sentimentos.', 'Conseguimos resolver assuntos sem deixar tudo acumular.', 'Nossas conversas terminam com mais clareza do que começaram.', 'Consigo expressar o que sinto sem medo da reação do meu cônjuge.'] },
            { name: 'Respeito', questions: ['Somos tratados com dignidade mesmo nos momentos difíceis.', 'Nossas palavras preservam a honra um do outro.', 'Não usamos humilhação, sarcasmo ou desprezo nas discussões.', 'Me sinto valorizado(a) pelo meu cônjuge.', 'As opiniões de cada um são levadas a sério na relação.'] },
            { name: 'Confiança', questions: ['Existe transparência entre nós no dia a dia.', 'Me sinto seguro(a) em relação à sinceridade do meu cônjuge.', 'Não há segredos que prejudiquem a nossa relação.', 'Posso contar com o meu cônjuge quando mais preciso.', 'A palavra do meu cônjuge tem credibilidade para mim.'] },
            { name: 'Segurança Emocional', questions: ['Posso ser vulnerável sem medo de ser atacado(a).', 'Sinto acolhimento quando estou mal emocionalmente.', 'Meu cônjuge me oferece suporte emocional nos momentos difíceis.', 'Me sinto seguro(a) para compartilhar minhas inseguranças.', 'Nossa relação é um lugar de paz, não de medo.'] },
            { name: 'Tempo de Qualidade', questions: ['Temos momentos reais de presença um com o outro.', 'Nosso casamento ainda tem espaço garantido na rotina.', 'Passamos tempo juntos sem distrações constantes.', 'Criamos memórias e experiências boas juntos.', 'Priorizamos momentos a dois mesmo com a correria do dia a dia.'] },
            { name: 'Finanças', questions: ['Falamos sobre dinheiro com clareza e sem brigas.', 'Temos alinhamento sobre prioridades financeiras.', 'As finanças não geram conflitos constantes entre nós.', 'Somos transparentes sobre gastos e rendas.', 'Planejamos o futuro financeiro juntos.'] },
            { name: 'Intimidade', questions: ['Existe carinho e proximidade física entre nós.', 'Conseguimos falar sobre intimidade com maturidade.', 'A conexão emocional entre nós está saudável.', 'Me sinto desejado(a) e valorizado(a) pelo meu cônjuge.', 'A intimidade do nosso relacionamento nos une, não nos afasta.'] },
            { name: 'Propósito do Casal', questions: ['Temos uma visão de futuro em comum.', 'Sabemos para onde queremos ir como casal.', 'Nossas decisões refletem objetivos compartilhados.', 'Construímos metas juntos e trabalhamos por elas.', 'Nosso casamento tem um propósito maior do que apenas conviver.'] },
            { name: 'Vida Espiritual e Fé', questions: ['Nossa fé fortalece a nossa união como casal.', 'Oramos ou buscamos direção espiritual juntos.', 'Nossos valores espirituais estão alinhados.', 'A fé nos ajuda a superar os momentos difíceis do casamento.', 'A espiritualidade faz parte das decisões importantes do nosso relacionamento.'] },
            { name: 'Reparação e Reconciliação', questions: ['Conseguimos pedir perdão genuinamente quando erramos.', 'Somos capazes de perdoar e seguir em frente sem guardar rancor.', 'Quando erramos, assumimos responsabilidade sem justificar.', 'Nosso casal sabe como se recuperar após conflitos.', 'Acreditamos que nosso relacionamento pode ser restaurado.'] }
        ];

        const recommendations = {
            'Comunicação': 'Marquem um momento fixo na semana para conversar sem celular e sem pressa. Pratiquem ouvir até o fim antes de responder.',
            'Respeito': 'Façam um pacto de não usar palavras que humilham. Comecem a nomear qualidades um do outro todos os dias.',
            'Confiança': 'Abram os segredos que pesam. A transparência, mesmo que dolorosa, é o único caminho para reconstruir a confiança.',
            'Segurança Emocional': 'Criem um acordo: nenhum dos dois ataca o outro quando ele se abre. Acolher é mais importante do que ter razão.',
            'Tempo de Qualidade': 'Reservem ao menos 30 minutos por dia só para os dois. Sem agenda, sem telas, apenas presença.',
            'Finanças': 'Sentem juntos, abram os números e façam um orçamento básico. Transparência financeira é base para confiança.',
            'Intimidade': 'Comecem pelo carinho simples: um abraço mais longo, um toque gentil. A intimidade se reconstrói pelo afeto antes do físico.',
            'Propósito do Casal': 'Escrevam juntos três sonhos para o relacionamento. Ter visão compartilhada muda a forma como encaram os problemas do dia a dia.',
            'Vida Espiritual e Fé': 'Reservem um momento por semana para orar ou refletir juntos. A fé compartilhada é um dos maiores sustentáculos do casamento.',
            'Reparação e Reconciliação': 'Comecem com um pedido de perdão genuíno por algo que ainda pesa. Reconciliação começa com responsabilidade, não com culpa.'
        };

        let currentArea = -1;
        let allResponses = {};

        function saveAreaResponses(areaIndex) {
            const area = areas[areaIndex];
            for (let i = 0; i < area.questions.length; i++) {
                const qId = `q${areaIndex}_${i}`;
                const checked = document.querySelector(`input[name="${qId}"]:checked`);
                if (checked) {
                    allResponses[qId] = parseInt(checked.value);
                }
            }
        }

        function renderWelcome() {
            const html = `
                <div class="section active" id="welcome">
                    <div class="progress-bar"><div class="progress-fill" style="width: 0%"></div></div>
                    <div class="instructions">
                        <strong>Bem-vindo ao Termômetro do Casal!</strong><br><br>
                        Responda com sinceridade. Não existem respostas certas ou erradas. O objetivo não é julgar, mas ajudar você e seu cônjuge a enxergar com clareza onde o relacionamento está forte e onde precisa de atenção.<br><br>
                        Se possível, cada cônjuge deve responder separadamente.<br><br>
                        O diagnóstico aparecerá ao final, após clicar no botão "Ver meu diagnóstico".
                    </div>
                    <div class="button-group">
                        <button class="btn-primary" onclick="nextSection()">Começar</button>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function renderSafety() {
            const html = `
                <div class="section active" id="safety">
                    <div class="progress-bar"><div class="progress-fill" style="width: 2%"></div></div>
                    <div class="progress-text">Pergunta 1 de 51</div>
                    <div class="question-group">
                        <div class="question">
                            <div class="question-text">Você se sente com medo, sob ameaça ou em situação de violência no seu relacionamento?</div>
                            <div class="choice-options">
                                <div class="choice-option">
                                    <input type="radio" id="safety-yes" name="safety" value="yes" onchange="handleSafety()">
                                    <label for="safety-yes">Sim</label>
                                </div>
                                <div class="choice-option">
                                    <input type="radio" id="safety-no" name="safety" value="no" onchange="handleSafety()">
                                    <label for="safety-no">Não</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn-secondary" onclick="previousSection()">Voltar</button>
                        <button class="btn-primary" id="safetyNext" onclick="nextSection()" disabled>Próximo</button>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function handleSafety() {
            const safety = document.querySelector('input[name="safety"]:checked');
            if (safety) {
                document.getElementById('safetyNext').disabled = false;
                allResponses.safety = safety.value;
            }
        }

        function renderSafetyAlert() {
            const html = `
                <div class="section active" id="safety-alert">
                    <div class="safety-alert">
                        <strong>⚠️ Sua segurança é a prioridade.</strong><br><br>
                        Em situações de violência ou ameaça, procure ajuda profissional especializada ou ligue para o CVV: <strong>188</strong>.<br><br>
                        Este diagnóstico não substitui acompanhamento terapêutico ou jurídico.<br><br>
                        Você não está sozinho(a). Ajuda está disponível.
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function renderArea(areaIndex) {
            const area = areas[areaIndex];
            const progressPercent = ((areaIndex + 1) / areas.length) * 100;
            const questionStart = areaIndex * 5 + 2;
            const questionEnd = questionStart + 4;

            let questionsHtml = '';
            area.questions.forEach((q, idx) => {
                const qNum = idx + 1;
                const qId = `q${areaIndex}_${idx}`;
                questionsHtml += `
                    <div class="question">
                        <div class="question-text">${qNum}. ${q}</div>
                        <div class="scale-options">
                            <div class="scale-option"><input type="radio" id="${qId}_1" name="${qId}" value="1" onchange="checkAreaComplete(${areaIndex})"><label for="${qId}_1">1</label></div>
                            <div class="scale-option"><input type="radio" id="${qId}_2" name="${qId}" value="2" onchange="checkAreaComplete(${areaIndex})"><label for="${qId}_2">2</label></div>
                            <div class="scale-option"><input type="radio" id="${qId}_3" name="${qId}" value="3" onchange="checkAreaComplete(${areaIndex})"><label for="${qId}_3">3</label></div>
                            <div class="scale-option"><input type="radio" id="${qId}_4" name="${qId}" value="4" onchange="checkAreaComplete(${areaIndex})"><label for="${qId}_4">4</label></div>
                            <div class="scale-option"><input type="radio" id="${qId}_5" name="${qId}" value="5" onchange="checkAreaComplete(${areaIndex})"><label for="${qId}_5">5</label></div>
                        </div>
                        <small style="color: #999; margin-top: 8px; display: block;">Discordo totalmente ← → Concordo totalmente</small>
                    </div>
                `;
            });

            const html = `
                <div class="section active" id="area${areaIndex}">
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                    <div class="progress-text">Questões ${questionStart}-${questionEnd} de 51</div>
                    <div class="question-group">
                        <h3>Área ${areaIndex + 1}: ${area.name}</h3>
                        ${questionsHtml}
                    </div>
                    <div class="button-group">
                        <button class="btn-secondary" onclick="previousSection()">Voltar</button>
                        <button class="btn-primary" id="nextBtn${areaIndex}" onclick="nextSection()" disabled>Próximo</button>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function checkAreaComplete(areaIndex) {
            const area = areas[areaIndex];
            let allAnswered = true;
            for (let i = 0; i < area.questions.length; i++) {
                const qId = `q${areaIndex}_${i}`;
                const checked = document.querySelector(`input[name="${qId}"]:checked`);
                if (!checked) {
                    allAnswered = false;
                    break;
                }
            }
            document.getElementById(`nextBtn${areaIndex}`).disabled = !allAnswered;
        }

        function calculateResults() {
            const areaScores = {};
            let totalScore = 0;

            areas.forEach((area, areaIndex) => {
                let areaTotal = 0;
                for (let i = 0; i < area.questions.length; i++) {
                    const qId = `q${areaIndex}_${i}`;
                    const value = allResponses[qId] || 0;
                    areaTotal += value;
                }
                const areaScore = (areaTotal / 25) * 100;
                areaScores[area.name] = areaScore;
                totalScore += areaTotal;
            });

            const overallScore = (totalScore / 250) * 100;
            return { overallScore, areaScores };
        }

        function renderResults() {
            const { overallScore, areaScores } = calculateResults();

            const sortedAreas = Object.entries(areaScores).sort((a, b) => a[1] - b[1]);
            const weakestArea = sortedAreas[0][0];
            const strongestArea = sortedAreas[sortedAreas.length - 1][0];

            let bandData = {};
            if (overallScore < 40) {
                bandData = { title: 'Crise Grave', message: 'Seu relacionamento está passando por um momento muito difícil. Há sinais claros de sofrimento em diversas áreas. O primeiro passo é buscar ajuda especializada, como um conselheiro ou terapeuta de casais. Mesmo nos momentos mais sombrios, a reconstrução é possível com intenção e apoio.' };
            } else if (overallScore < 55) {
                bandData = { title: 'Alerta Alto', message: 'Seu relacionamento está fragilizado e precisa de atenção imediata. Ainda há base para reconstrução, mas é necessário agir com urgência. Pequenas mudanças de atitude, somadas a diálogo honesto, podem fazer uma grande diferença.' };
            } else if (overallScore < 70) {
                bandData = { title: 'Atenção e Reconstrução', message: 'Seu relacionamento tem pontos de tensão importantes, mas também tem recursos para se recuperar. Este é o momento de agir com intencionalidade. Foque na área mais fraca e comece por pequenos passos concretos.' };
            } else if (overallScore < 85) {
                bandData = { title: 'Estável, mas com Pontos de Risco', message: 'Seu relacionamento está funcionando, mas há áreas que precisam de cuidado antes que se tornem problemas maiores. Não caia no automático. Invista no que pode ser melhorado enquanto ainda está relativamente bem.' };
            } else {
                bandData = { title: 'Relacionamento Saudável', message: 'Seu relacionamento está em um bom momento. Isso é fruto de esforço, diálogo e compromisso de ambos. Continue cuidando, pois relacionamentos saudáveis precisam de manutenção constante.' };
            }

            let scoresTableHtml = '<table class="scores-table"><thead><tr><th>Área</th><th class="area-score">Pontuação</th></tr></thead><tbody>';
            sortedAreas.forEach(([areaName, score]) => {
                scoresTableHtml += `<tr><td class="area-name">${areaName}</td><td class="area-score">${score.toFixed(0)}</td></tr>`;
            });
            scoresTableHtml += '</tbody></table>';

            const html = `
                <div class="section active" id="results">
                    <div class="result-band">
                        <h2>${bandData.title}</h2>
                        <div class="score">${overallScore.toFixed(0)}</div>
                        <p>Sua pontuação geral de saúde do relacionamento</p>
                    </div>

                    <div class="result-interpretation">
                        ${bandData.message}
                    </div>

                    <h3 style="color: #1e3a5f; margin-bottom: 20px; font-size: 18px;">Pontuação por Área</h3>
                    ${scoresTableHtml}

                    <div class="strongest-weakest">
                        <div class="card card-strongest">
                            <h4>Área Mais Forte</h4>
                            <p>${strongestArea}</p>
                            <div style="font-size: 24px; font-weight: 700; color: #22c55e; margin-top: 10px;">${areaScores[strongestArea].toFixed(0)}</div>
                        </div>
                        <div class="card card-weakest">
                            <h4>Área Mais Fraca</h4>
                            <p>${weakestArea}</p>
                            <div style="font-size: 24px; font-weight: 700; color: #ef4444; margin-top: 10px;">${areaScores[weakestArea].toFixed(0)}</div>
                        </div>
                    </div>

                    <div class="recommendation">
                        <h4>Recomendação para ${weakestArea}</h4>
                        ${recommendations[weakestArea]}
                    </div>

                    <div class="closing-message">
                        Este diagnóstico é um ponto de partida, não uma sentença. Todo relacionamento tem ciclos de crise e reconstrução. O que define o futuro do casal não é onde ele está hoje, mas a decisão de caminhar juntos a partir daqui. Você não está sozinho(a) nessa jornada.
                    </div>

                    <div class="button-group" style="margin-top: 30px;">
                        <button class="btn-secondary" onclick="location.reload()">Recomeçar</button>
                    </div>
                </div>
            `;
            document.getElementById('content').innerHTML = html;
        }

        function nextSection() {
            if (currentArea === -1) {
                currentArea = -2;
                renderSafety();
            } else if (currentArea === -2) {
                if (allResponses.safety === 'yes') {
                    renderSafetyAlert();
                } else {
                    currentArea = 0;
                    renderArea(0);
                }
            } else if (currentArea >= 0 && currentArea < areas.length - 1) {
                saveAreaResponses(currentArea);
                currentArea++;
                renderArea(currentArea);
            } else if (currentArea === areas.length - 1) {
                saveAreaResponses(currentArea);
                renderResults();
            }
        }

        function previousSection() {
            if (currentArea > 0) {
                currentArea--;
                renderArea(currentArea);
            } else if (currentArea === 0) {
                currentArea = -2;
                renderSafety();
            } else if (currentArea === -2) {
                currentArea = -1;
                renderWelcome();
            }
        }

        renderWelcome();
    </script>
</body>
</html>
